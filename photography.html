<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body id="photography-main" onkeydown="onKeyPressed(event)" style="padding-top: 30px; background-image: linear-gradient(to right,#1c3f59, #738896);">
    <header id="banner">
    <!-- navbar  begin -->
        <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img id="wordmark" src="images/Wordmark-Real2.png" alt="JAD block logo">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav  ms-auto me-auto">
                    <li class="nav-item "><a class="focus nav-link" href="work.html"> Past Work </a></li>
                    <li class="nav-item"><a class="focus nav-link" href="about-me.html"> About Me </a></li>
                    <li class="nav-item"><a class="focus nav-link active" href="photography.html">Photography </a></li>
                    <li class="nav-item"><a class="focus nav-link" href="contact.html"> Contact Me </a></li>
                </ul>
            </div>
        </div>
    </nav>
<!-- navbar  end  -->
</header>

    <div id="spacer"></div>

    <!-- Local Photography -->
    <header class="separator">Local</header>
    <div class="grid-container">
        <main style="grid-area: main;">
            <img class="photographs" src="images/sky.jpg" alt="Sky with sun glare">
            <img class="photographs" src="images/railroad.jpg" alt="Railroad with sweeping sky">
            <img class="photographs" src="images/bowling.jpg" alt="Sky with shipping container in frame">
        </main>
    </div>

    <!-- Hiking Photography -->
    <header class="separator">Hiking</header>
    <div class="grid-container">
        <main style="grid-area: main; justify-items: center;">
            <img class="photographs" src="images/hiking1.jpg" alt="Mountain treeline with sun glare">
            <img class="photographs" src="images/hiking-glare.jpg" alt="Hiking with sun glare">
            <img class="photographs" src="images/hiking-dark.jpg" alt="Afternoon mountain view">
        </main>
    </div>

    <!-- Travel Photography -->
    <header class="separator">Travel</header>
    <div class="grid-container">
        <main style="grid-area: main; justify-items: center;">
            <img class="photographs" src="images/hawaii1.jpg" alt="Ocean view during day">
            <img class="photographs" src="images/hawaii2.jpg" alt="Rocky beach">
            <img class="photographs" src="images/hawaii3.jpg" alt="Rocky beach again">
            <img class="photographs" src="images/ocean-sunset.jpg" alt="Ocean view with an orange sunset">
            <img class="photographs" src="images/hawaii-plant1.jpg" alt="Plant in center frame with visible ocean behind">
            <img class="photographs" src="images/hawaii-plant2.jpg" alt="Plant in center frame with visible ocean behind">
        </main>
    </div>
    
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script>    
function onKeyPressed(event) {
        if (event.key === "ArrowRight" || event.keyCode === 39) {
            window.location.href = "contact.html";
        }
        if (event.keyCode === 37) { 
            window.location.href = "about-me.html";
        }
        
    }
</script>
</html>
